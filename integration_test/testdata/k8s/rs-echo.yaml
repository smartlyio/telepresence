---
apiVersion: v1
kind: Service
metadata:
  name: rs-echo
spec:
  type: ClusterIP
  selector:
    app: rs-echo
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-echo
  labels:
    app: rs-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rs-echo
  template:
    metadata:
      labels:
        app: rs-echo
        budget: telepresence-test
    spec:
      containers:
        - name: rs-echo
          image: ghcr.io/telepresenceio/echo-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            limits:
              cpu: 50m
              memory: 128Mi
