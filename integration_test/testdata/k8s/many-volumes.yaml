apiVersion: v1
kind: Secret
metadata:
  name: hello-secret-1
type: kubernetes.io/basic-auth
stringData:
  username: "hello-1"
  password: "hello-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: hello-secret-2
type: kubernetes.io/basic-auth
stringData:
  username: "hello-2"
  password: "hello-2"
---
apiVersion: v1
kind: Service
metadata:
  name: hello
spec:
  type: ClusterIP
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      volumes:
        - name: v1
          configMap:
            name: cm1
        - name: v2
          configMap:
            name: cm2
        - name: v3
          configMap:
            name: cm3
        - name: v4
          configMap:
            name: cm4
        - name: v5
          configMap:
            name: cm5
        - name: v6
          configMap:
            name: cm6
        - name: v7
          configMap:
            name: cm7
        - name: v8
          configMap:
            name: cm8
        - name: ed1
          emptyDir: {}
        - name: ed2
          emptyDir: {}
        - name: ed3
          emptyDir: {}
        - name: ed4
          emptyDir: {}
        - name: ed5
          emptyDir: {}
        - name: ed6
          emptyDir: {}
        - name: ed7
          emptyDir: {}
        - name: ed8
          emptyDir: {}
      containers:
        - name: hello
          image: ghcr.io/telepresenceio/echo-server:latest
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - mountPath: "/usr/share/cm1"
              name: v1
            - mountPath: "/usr/share/cm2"
              name: v2
            - mountPath: "/usr/share/cm3"
              name: v3
            - mountPath: "/usr/share/cm4"
              name: v4
            - mountPath: "/usr/share/cm5"
              name: v5
            - mountPath: "/usr/share/cm6"
              name: v6
            - mountPath: "/usr/share/cm7"
              name: v7
            - mountPath: "/usr/share/cm8"
              name: v8
            - mountPath: "/tmp1"
              name: ed1
            - mountPath: "/tmp2"
              name: ed2
            - mountPath: "/tmp3"
              name: ed3
            - mountPath: "/tmp4"
              name: ed4
            - mountPath: "/tmp5"
              name: ed5
            - mountPath: "/tmp6"
              name: ed6
            - mountPath: "/tmp7"
              name: ed7
            - mountPath: "/tmp8"
              name: ed8
